<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SSE Stuntman</title>
<!-- for mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --ds-font-family-code: Menlo, Monaco, Consolas, "Cascadia Mono", "Ubuntu Mono", "DejaVu Sans Mono", "Liberation Mono", "JetBrains Mono", "Fira Code", Cousine, "Roboto Mono", "Courier New", Courier, sans-serif, system-ui;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; padding: 40px; }
  

  .container { max-width: 1280px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p { color: #666; margin-bottom: 24px; }
  .card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 16px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; }
  select, input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; margin-bottom: 16px; }
  button { background: #0070f3; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; cursor: pointer; }
  button:hover { background: #0051a8; }
  pre { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 4px; overflow-x: auto; font-size: 13px; min-height: 200px; white-space: pre-wrap;word-break: break-word; font-family: var(--ds-font-family-code); }
  .info { background: #eef2ff; border-left: 4px solid #6366f1; padding: 12px 16px; border-radius: 4px; font-size: 13px; color: #4338ca; margin-bottom: 16px; }
  code { background: #e8e8e8; padding: 2px 6px; border-radius: 3px; font-size: 13px; }

  .output-wrapper {
    display: flex; gap: 1rem; max-height: 50vh;
  }
  /* for mobile body padding to 1rem */
  @media (width <= 768px) {
    body {
      padding: 1rem;
    }

    .card {
      padding: 0.7rem;
    }

    .output-wrapper {
      gap: 0.5rem;
    }
  }
  
</style>
</head>
<body>
<div class="container">
  <h1>🏍️  SSE Stuntman</h1>
  <p>Stunt double for your AI API — simulate streaming responses.</p>

  <div class="info">
    Endpoint: <code>POST http://localhost:${port}${apiPath}</code><br>
    <!-- Endpoint: <code>POST http://localhost:${options.port}${apiPath}</code><br> -->
    Use <code>?scenario=name</code> to switch scenarios.
  </div>

  <div class="card">
    <label for="scenario">Scenario</label>
    <select id="scenario">
      ${scenarioOptsHTML}
    </select>

    <label for="model">Model</label>
    <input id="model" type="text" value="${model}" placeholder="gpt-4o">

    <button type="button" onclick="testStream()">Test Stream</button>
  </div>

  <div class="output-wrapper" style="">
    <pre id="output" style="flex: 1;line-height: 1.8em;">Click "Test Stream" to see the response...</pre>
    <pre id="raw" style="flex: 1; ">Raw SSE response...</pre>
  </div>
</div>

<script type="module">
const output = document.getElementById('output');
const rawElement = document.getElementById('raw');

const scenarioElement = document.getElementById('scenario');
scenarioElement.value = new URLSearchParams(window.location.search).get('scenario') || 'default';
scenarioElement.addEventListener('change', () => {
  window.location.search = `?scenario=${scenarioElement.value}`;
})

// let lastScrollTop = 0; // 记录上一次滚动位置

globalThis.testStream = testStream

async function testStream() {
  const scenario = document.getElementById('scenario').value;
  const model = document.getElementById('model').value;

  output.textContent = 'Connecting...';
  rawElement.textContent = 'Connecting...';

  try {
    const res = await fetch('${apiPath}?scenario=' + scenario, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, stream: true, messages: [{ role: 'user', content: 'Hello' }] })
    });

    if (!res.ok) {
      const err = await res.json();
      output.textContent = 'HTTP ' + res.status + '\n' + JSON.stringify(err, null, 2);
      return;
    }

    output.textContent = '';
    rawElement.textContent = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) {break;}

      buffer += decoder.decode(value, { stream: true });
      // console.log('buffer:', buffer);
      rawElement.textContent += buffer;
      await scrollToBottom(rawElement);
      const lines = buffer.split('\n');
      // console.log('lines:', lines);
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const jsonStr = line.slice(6).trim();
          if (jsonStr === '[DONE]') {continue;}
          try {
            const data = JSON.parse(jsonStr);
            const content = data.choices?.[0]?.delta?.content || '';
            output.textContent += content;

            // const start = Date.now();
            await scrollToBottom(output);
            // console.log('scrollToBottom:', Date.now() - start);
          } catch {}
        }
      }
    }
  } catch (e) {
    console.error(e);
    output.textContent = 'Error: ' + e.message;
    rawElement.textContent = 'Error';
  }
}

/**
 * 滚动到聊天底部（受保护）
 * @param {Element} target 滚动目标
 */
async function scrollToBottom(target) {
  await nextTick()

  if (target.__followBottom ?? true) {
    target.scrollTop = target.scrollHeight
  }
}

output.addEventListener('scroll', () => handleScroll(output));
rawElement.addEventListener('scroll', () => handleScroll(rawElement));

/**
 * @param {Element} scrollTarget
 */
function handleScroll(scrollTarget) {
  const { scrollTop, scrollHeight, clientHeight } = scrollTarget;
  const currentScrollBottom = scrollHeight - scrollTop - clientHeight;

  // 1. 如果用户向上滚动了（scrollTop 变小），并且之前是跟随状态
  if (scrollTop < (scrollTarget.__lastScrollTop ?? 0)) {
    // 只有用户主动往上滚，才取消“跟随底部”
    // 防止出现负值（惯性滚动）导致的误判
    if (currentScrollBottom > 10) {
      scrollTarget.__followBottom = false;

      console.log('[Scroll] 用户手动向上滚动，停止跟随');
    }
  }

  // 2. 如果用户当前已经是滚到底部了（距离底部 5px 以内）
  if (currentScrollBottom <= 5) {
    // 只要滚到底部，就无条件恢复跟随状态
    if (!scrollTarget.__followBottom) {
      console.log('[Scroll] 用户滚到底部，恢复跟随');
    }
    scrollTarget.__followBottom = true;
  }

  // 更新上次滚动位置
  scrollTarget.__lastScrollTop = scrollTop;
};

function nextTick() {
  return new Promise((resolve) => {
    requestAnimationFrame(resolve)
  })
}
</script>
</body>
</html>
