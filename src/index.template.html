<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SSE Stuntman</title>
<!-- favicon is 🏍 -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏍</text></svg>">

<!-- for mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --ds-font-family-code: Menlo, Monaco, Consolas, "Cascadia Mono", "Ubuntu Mono", "DejaVu Sans Mono", "Liberation Mono", "JetBrains Mono", "Fira Code", Cousine, "Roboto Mono", "Courier New", Courier, sans-serif, system-ui;
    font-size: clamp(16px, 100vw / 2560 * 28.6, 36px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; 
    color: #333;
    padding-block: 1.2rem 2rem;
    padding-inline: 2rem;
  }

  .container { max-width: 80rem; margin: 0 auto; }
  h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
  p { line-height: 1.2rem; }
  .card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 1.5rem; margin-bottom: 16px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; }
  select, input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; 
    font-size: max(0.8rem, 13px); margin-bottom: 16px; }
  button { background: #0070f3; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 0.875rem; cursor: pointer; }
  button:hover { background: #0051a8; }
  pre { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 4px; overflow-x: auto; 
    font-size: max(0.70rem, 13px); min-height: 12.5rem; white-space: pre-wrap;word-break: break-word; font-family: var(--ds-font-family-code); }
  .info {
    /* background: #eef2ff; */
    /* border-left: 4px solid #6366f1; */
    /* padding: 0.75rem 1rem; */
    /* border-radius: 4px;  */
    color: #4338ca;
    margin-bottom: 16px; }
  code { background: #e8e8e8; padding: 2px 6px; border-radius: 3px;
    font-size: 0.8em; }

  .control-row { display: flex; gap: 0.625rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .control-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 80px; }
  /* .control-group label { font-size: 11px; font-weight: 600; color: #666; margin-bottom: 0; } */
  .control-group select,
  .control-group input { margin-bottom: 0; max-width: 100%; }
  .btn-row { display: flex; gap: 0.5rem; align-items: center; }
  .btn-secondary { background: #e8e8e8; color: #333; }
  .btn-secondary:hover { background: #d0d0d0; }
  #streamBtn.stop { background: #e00; }
  #streamBtn.stop:hover { background: #b00; }

  .output-wrapper {
    display: flex; gap: 1rem; max-height: 50vh;
  }

  .drawer {
    margin: 0 0 0 auto;
    height: 100vh;
    max-height: 100vh;
    width: 30rem;
    max-width: 90vw;
    border: 0;
    border-radius: 0;
    padding: 24px;
    box-sizing: border-box;
    &:open {
      display: flex;
    }
    flex-direction: column;
    transition: translate 0.3s, display 0.3s allow-discrete, overlay 0.3s allow-discrete;
    translate: 100% 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .drawer[open] {
    translate: 0 0;
  }

  @starting-style {
    .drawer[open] {
      translate: 100% 0;
    }
  }

  .drawer::backdrop {
    background: rgba(0, 0, 0, 0.3);
    transition: opacity 0.3s;
  }

  .drawer h2 {
    margin-bottom: 0.75rem;
    font-size: 1.25rem;
  }

  .drawer label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #666;
    margin-bottom: 0.25rem;
  }

  .drawer input,
  .drawer textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 0.875rem;
    margin-bottom: 16px;
    box-sizing: border-box;
  }

  .drawer textarea {
    flex: 1;
    min-height: 180px;
    font-family: var(--ds-font-family-code);
    font-size: 0.55rem;
    resize: vertical;
  }

  .drawer .path-hint {
    font-size: 0.75rem;
    color: #666;
    background: #f5f5f5;
    padding: 8px 12px;
    border-radius: 4px;
    margin-bottom: 16px;
    word-break: break-all;
    line-height: 1.5;
  }

  .drawer .path-hint code {
    background: transparent;
    padding: 0;
  }

  .drawer-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    padding-top: 16px;
  }

  /* for mobile body padding to 1rem */
  @media (width <= 768px) {
    body {
      padding: 1rem;
    }

    .card {
      padding: 0.7rem;
    }

    .control-row { flex-direction: column; }
    .btn-row { flex-direction: column; }
    .btn-row button { width: 100%; }

    .output-wrapper {
      gap: 0.5rem;
    }

    .drawer {
      width: 100vw;
      max-width: 100vw;
    }
  }
  </style>
</head>
<body>
<div class="container">
    <h1 style="text-align: center;">🏍️  SSE Stuntman</h1>
    <p style="text-align: center; margin-bottom: 1rem;">Stunt double for your AI API — simulate streaming responses.</p>
    <div class="info">
      <div style="margin-inline: auto; width: fit-content;">
        <p>Port: <code>${port}</code> | Endpoint: <code>POST ${apiPath}</code></p>
        <p>Scenarios: <code>${scenarioCount} loaded</code></p>
      </div>
    </div>
    <div class="card">
      <div class="control-row">
        <div class="control-group">
          <label for="scenario">Scenario</label>
          <select id="scenario">
            ${scenarioOptsHTML}
          </select>
        </div>
        <div class="control-group">
          <label for="model">Model</label>
          <input id="model" type="text" value="${model}" placeholder="gpt-4o">
        </div>
        <div class="control-group">
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
          </select>
        </div>
      </div>
      <div class="control-row">
        <div class="control-group">
          <label for="chunkStrategy">Chunk</label>
          <select id="chunkStrategy">
            <option value="word">word</option>
            <option value="sentence">sentence</option>
            <option value="char">char</option>
            <option value="line">line</option>
            <option value="paragraph">paragraph</option>
          </select>
        </div>
        <div class="control-group">
          <label for="delayMultiplier">Speed</label>
          <input id="delayMultiplier" type="number" value="${delayMultiplier}" min="0" step="0.1">
        </div>
        <div class="control-group">
          <label for="defaultDelay">Chunk Delay</label>
          <input id="defaultDelay" type="number" value="${defaultDelay}" min="0">
        </div>
      </div>
      <div class="btn-row">
        <button id="streamBtn" type="button" onclick="toggleStream()">Test Stream</button>
        <button type="button" class="btn-secondary" onclick="createScenario(event)" title="Create a new scenario file">+ New Scenario</button>
      </div>
    </div>
  </div>

  <div class="container output-wrapper" style="">
    <pre id="output" style="flex: 1;line-height: 1.8em;">Click "Test Stream" to see the response...</pre>
    <pre id="raw" style="flex: 1; ">Raw SSE response...</pre>
  </div>

<dialog id="createDrawer" class="drawer">
  <h2>+ New Scenario</h2>

  <label for="newScenarioName">Name</label>
  <input id="newScenarioName" type="text" placeholder="my-scenario" oninput="updateFileNamePreview()" autofocus>

  <div class="path-hint">
    Will create: <code>~/.sse-stuntman/scenarios/<span id="fileNamePreview">my-scenario.md</span></code>
  </div>

  <label for="newScenarioContent">Content (edit before create)</label>
  <textarea id="newScenarioContent" spellcheck="false"></textarea>

  <div class="drawer-actions">
    <button type="button" class="btn-secondary" onclick="createDrawer.close()">Cancel</button>
    <button type="button" onclick="submitNewScenario()">Create</button>
  </div>
</dialog>

<script type="module">
const output = document.getElementById('output');
const rawElement = document.getElementById('raw');
const streamBtn = document.getElementById('streamBtn');
const scenarioElement = document.getElementById('scenario');
const model = document.getElementById('model');
const provider = document.getElementById('provider');
const chunkStrategy = document.getElementById('chunkStrategy');
const delayMultiplier = document.getElementById('delayMultiplier');
const defaultDelay = document.getElementById('defaultDelay');

const createDrawer = document.getElementById('createDrawer')

scenarioElement.value = new URLSearchParams(window.location.search).get('scenario') || 'default';
provider.value = new URLSearchParams(window.location.search).get('provider') || '${provider}';
chunkStrategy.value = new URLSearchParams(window.location.search).get('chunk-strategy') || '${chunkStrategy}';
delayMultiplier.value = new URLSearchParams(window.location.search).get('delay-multiplier') || '${delayMultiplier}';
defaultDelay.value = new URLSearchParams(window.location.search).get('default-delay') || '${defaultDelay}';

let controller = null;

globalThis.toggleStream = toggleStream;
globalThis.createScenario = createScenario;
globalThis.submitNewScenario = submitNewScenario;
globalThis.updateFileNamePreview = updateFileNamePreview;

function buildQueryString() {
  const params = new URLSearchParams();
  params.set('scenario', scenarioElement.value);
  if (provider.value !== '${provider}') {params.set('provider', provider.value);}
  if (chunkStrategy.value !== '${chunkStrategy}') {params.set('chunk-strategy', chunkStrategy.value);}
  if (delayMultiplier.value !== '${delayMultiplier}') {params.set('delay-multiplier', delayMultiplier.value)};
  if (defaultDelay.value !== '${defaultDelay}') {params.set('default-delay', defaultDelay.value);}
  const qs = params.toString();
  return qs ? '?' + qs : '';
}

function updateURL() {
  const qs = buildQueryString();
  const url = window.location.pathname + (qs || window.location.search ? qs : '');
  window.history.replaceState(null, '', url);
}

scenarioElement.addEventListener('change', updateURL);
provider.addEventListener('change', updateURL);
chunkStrategy.addEventListener('change', updateURL);
delayMultiplier.addEventListener('input', updateURL);
defaultDelay.addEventListener('input', updateURL);

async function toggleStream() {
  if (controller) {
    controller.abort();
    resetStreamState('Aborted.');
    return;
  }

  controller = new AbortController();
  streamBtn.textContent = 'Stop';
  streamBtn.classList.add('stop');

  output.textContent = 'Connecting...';
  rawElement.textContent = 'Connecting...';

  const qs = buildQueryString();

  try {
    const res = await fetch('${apiPath}' + qs, {
      method: 'POST',
      signal: controller.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: model.value, stream: true, messages: [{ role: 'user', content: 'Hello' }] })
    });

    if (!res.ok) {
      const err = await res.json();
      output.textContent = 'HTTP ' + res.status + '\n' + JSON.stringify(err, null, 2);
      rawElement.textContent = 'HTTP ' + res.status;
      resetStreamButton();
      return;
    }

    output.textContent = '';
    rawElement.textContent = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      rawElement.textContent += buffer;
      await scrollToBottom(rawElement);
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const jsonStr = line.slice(6).trim();
          if (jsonStr === '[DONE]') continue;
          try {
            const data = JSON.parse(jsonStr);
            let content = '';
            if (data.choices?.[0]?.delta?.content) {
              content = data.choices[0].delta.content;
            } else if (data.type === 'content_block_delta' && data.delta?.text) {
              content = data.delta.text;
            }
            output.textContent += content;
            await scrollToBottom(output);
          } catch {}
        }
      }
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      resetStreamState('Aborted.');
      return;
    }
    console.error(e);
    output.textContent = 'Error: ' + e.message;
    rawElement.textContent = 'Error';
  }

  resetStreamButton();
}

function resetStreamButton() {
  controller = null;
  streamBtn.textContent = 'Test Stream';
  streamBtn.classList.remove('stop');
}

function resetStreamState(msg) {
  // output.textContent += `\n${msg}`;
  // rawElement.textContent += `\n${msg}`;
  resetStreamButton();
}

// click outside to close
document.addEventListener('click', (event) => {
  // console.log('event.target:', event.target);
  if (createDrawer === event.target) {
    createDrawer.close()
  }
})

/** @type {string} */
let _lastTemplateName = 'my-scenario';

function createScenario(event) {
  event.stopPropagation()
  document.getElementById('newScenarioName').value = '';
  _lastTemplateName = 'my-scenario';
  document.getElementById('newScenarioContent').value = getDefaultTemplate('');
  updateFileNamePreview();
  createDrawer.showModal();
}

function getDefaultTemplate(name) {
  const n = name || 'my-scenario';
  return [
    '<!-- @desc: Custom scenario "' + n + '" -->',
    '',
    'Available directives (place them anywhere in the file):',
    '',
    '> @error:TYPE → Simulate an API error (rate-limit / content-filter / server-error)',
    '',
    '# ' + n,
    '',
    'Write your scenario content here. Each section is split into chunks',
    'according to the --chunk-strategy setting.',
    '',
    '<!-- @delay: 150 -->',
    '`@delay: 150` -> This text appears after a 150ms pause.',
    '',
    '<!-- @input -->',
    'If this scenario includes @input, the user\'s message appears here.',
    '',
    '<!-- @delay: 300 -->',
    '`@delay: 300` -> One output, multiple delays — fully configurable.',
    '',
    'Stop streaming here',
    '<!-- @done -->',
  ].join('\n');
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function updateFileNamePreview() {
  const name = document.getElementById('newScenarioName').value.trim() || 'my-scenario';
  document.getElementById('fileNamePreview').textContent = name + '.md';

  const oldName = _lastTemplateName;
  if (oldName === name) return;

  const content = document.getElementById('newScenarioContent');
  let newContent = content.value;

  newContent = newContent.replace(
    '<!-- @desc: Custom scenario "' + oldName + '" -->',
    '<!-- @desc: Custom scenario "' + name + '" -->',
  );

  newContent = newContent.replace(
    new RegExp('^# ' + escapeRegex(oldName) + '$', 'm'),
    '# ' + name,
  );

  content.value = newContent;
  _lastTemplateName = name;
}

async function submitNewScenario() {
  const name = document.getElementById('newScenarioName').value.trim();
  if (!name) {
    alert('Please enter a scenario name.');
    return;
  }

  const exists = Array.from(scenarioElement.options).some(o => o.value === name);
  if (exists && !confirm(`Scenario "${name}" already exists. Overwrite?`)) {
    return;
  }

  const content = document.getElementById('newScenarioContent').value;

  try {
    const res = await fetch('/scenarios/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, content }),
    });
    const data = await res.json();

    if (!res.ok) {
      alert('Error: ' + (data.error || data.message || 'unknown'));
      return;
    }

    if (!data.overwritten) {
      const opt = document.createElement('option');
      opt.value = data.name;
      opt.textContent = data.name;
      scenarioElement.appendChild(opt);
    }
    scenarioElement.value = data.name;
    updateURL();
    createDrawer.close();
    alert(data.message + '\n\nFeel free to modify this file whenever needed: ' + data.filePath);
  } catch (e) {
    alert('Failed to create scenario: ' + e.message);
  }
}

/**
 * scroll to bottom with follow protection
 * @param {Element} target
 */
async function scrollToBottom(target) {
  await nextTick()

  if (target.__followBottom ?? true) {
    target.scrollTop = target.scrollHeight
  }
}

output.addEventListener('scroll', () => handleScroll(output));
rawElement.addEventListener('scroll', () => handleScroll(rawElement));

/**
 * @param {Element} scrollTarget
 */
function handleScroll(scrollTarget) {
  const { scrollTop, scrollHeight, clientHeight } = scrollTarget;
  const currentScrollBottom = scrollHeight - scrollTop - clientHeight;

  // 1. if user scrolled up (scrollTop decreased) and was in follow mode
  if (scrollTop < (scrollTarget.__lastScrollTop ?? 0)) {
    // only cancel follow when user actively scrolls up, not inertial scroll
    if (currentScrollBottom > 10) {
      scrollTarget.__followBottom = false;

      console.log('[Scroll] user scrolled up, unfollow bottom');
    }
  }

  // 2. if user is near the bottom (within 5px)
  if (currentScrollBottom <= 5) {
    // always resume follow when reaching bottom
    if (!scrollTarget.__followBottom) {
      console.log('[Scroll] scrolled to bottom, resume follow');
    }
    scrollTarget.__followBottom = true;
  }

  // update last scroll position
  scrollTarget.__lastScrollTop = scrollTop;
};

function nextTick() {
  return new Promise((resolve) => {
    requestAnimationFrame(resolve)
  })
}
</script>
</body>
</html>
